<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube - Interactive Video Player</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fcf9f8;
            color: #1c1b1b;
        }
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // Custom Icon Component to wrap Lucide
        const Icon = ({ name, className = "w-6 h-6", fill = "none" }) => {
            useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className} style={{ fill: fill }}></i>;
        };

        const INITIAL_VIDEOS = [
            {
                id: '1',
                title: 'The Ultimate Technical Deep Dive: Next-Gen Systems',
                channel: 'Engineering Masterclass',
                subscribers: '1.5M',
                views: '1.5M',
                time: '2 days ago',
                duration: '12:45',
                thumbnail: 'https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=1280&h=720&fit=crop',
                description: 'In this video, we explore the intricate details of next-generation system architecture. From low-level memory management to high-level cloud abstractions, we cover it all.',
                likes: '84K'
            },
            {
                id: '2',
                title: 'Building a Scalable Microservices Architecture',
                channel: 'Tech Weekly',
                subscribers: '800K',
                views: '200K',
                time: '1 week ago',
                duration: '18:45',
                thumbnail: 'https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=320&h=180&fit=crop',
                description: 'Learn how to architect systems that scale to millions of users using modern microservice patterns and container orchestration.',
                likes: '12K'
            },
            {
                id: '3',
                title: 'Modern Frontend State Management Patterns',
                channel: 'Code Insights',
                subscribers: '450K',
                views: '89K',
                time: '3 days ago',
                duration: '12:12',
                thumbnail: 'https://images.unsplash.com/photo-1587620962725-abab7fe55159?w=320&h=180&fit=crop',
                description: 'Comparing Redux, Recoil, and Context API in 2024. Which one should you pick for your next large-scale project?',
                likes: '5.2K'
            },
            {
                id: '4',
                title: 'The Future of Web Security',
                channel: 'CyberSec Network',
                subscribers: '2.1M',
                views: '1.2M',
                time: '1 month ago',
                duration: '24:00',
                thumbnail: 'https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=320&h=180&fit=crop',
                description: 'An in-depth look at emerging threats in web technologies and how to stay ahead using Zero Trust principles.',
                likes: '110K'
            },
            {
                id: '5',
                title: 'Understanding the Rust Borrow Checker',
                channel: 'Rust Lab',
                subscribers: '120K',
                views: '45K',
                time: '12 hours ago',
                duration: '15:30',
                thumbnail: 'https://images.unsplash.com/photo-1555066931-4365d14bab8c?w=320&h=180&fit=crop',
                description: 'Rust can be tricky! We break down the borrow checker concepts into simple visual mental models.',
                likes: '3.1K'
            }
        ];

        function App() {
            const [currentVideo, setCurrentVideo] = useState(INITIAL_VIDEOS[0]);
            const [isPlaying, setIsPlaying] = useState(true);
            const [isMuted, setIsMuted] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            const [blockedChannels, setBlockedChannels] = useState(new Set());
            const [showBlockedList, setShowBlockedList] = useState(false);
            const [isSubscribed, setIsSubscribed] = useState(false);
            const [userVote, setUserVote] = useState(null);
            const [isSaved, setIsSaved] = useState(false);

            const isCurrentChannelBlocked = blockedChannels.has(currentVideo.channel);

            const filteredVideos = useMemo(() => {
                return INITIAL_VIDEOS.filter(v => 
                    v.id !== currentVideo.id && 
                    !blockedChannels.has(v.channel) &&
                    (v.title.toLowerCase().includes(searchQuery.toLowerCase()) || 
                     v.channel.toLowerCase().includes(searchQuery.toLowerCase()))
                );
            }, [currentVideo.id, searchQuery, blockedChannels]);

            const toggleBlock = () => {
                const channel = currentVideo.channel;
                setBlockedChannels(prev => {
                    const next = new Set(prev);
                    if (next.has(channel)) {
                        next.delete(channel);
                    } else {
                        next.add(channel);
                    }
                    return next;
                });
            };

            const handleVideoSelect = (video) => {
                setCurrentVideo(video);
                setIsSubscribed(false);
                setUserVote(null);
                setIsSaved(false);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            return (
                <div className="min-h-screen">
                    {/* Nav */}
                    <nav className="fixed top-0 left-0 right-0 h-14 bg-white border-b border-zinc-100 flex items-center justify-between px-4 z-[100]">
                        <div className="flex items-center gap-4">
                            <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="p-2 rounded-full hover:bg-zinc-100">
                                <Icon name="menu" />
                            </button>
                            <div onClick={() => handleVideoSelect(INITIAL_VIDEOS[0])} className="flex items-center gap-1 text-xl font-bold tracking-tighter text-zinc-900 cursor-pointer group">
                                <Icon name="play-square" className="w-8 h-8 text-red-600" fill="currentColor" />
                                <span>YouTube</span>
                            </div>
                        </div>

                        <div className="flex-1 max-w-2xl px-4 md:px-8 flex items-center">
                            <div className="flex w-full items-center bg-zinc-50 border border-zinc-200 rounded-full px-4 h-10">
                                <input 
                                    type="text" 
                                    placeholder="Search" 
                                    className="bg-transparent border-none outline-none w-full text-sm"
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                />
                                <Icon name="search" className="w-5 h-5 text-zinc-500" />
                            </div>
                        </div>

                        <div className="flex items-center gap-3">
                            <Icon name="video" className="hidden sm:block" />
                            <Icon name="bell" />
                            <div className="w-8 h-8 rounded-full bg-zinc-200 overflow-hidden">
                                <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100&h=100&fit=crop" alt="" />
                            </div>
                        </div>
                    </nav>

                    {/* Sidebar Drawer */}
                    {isSidebarOpen && (
                        <div className="fixed inset-0 z-[150] flex">
                            <div className="w-64 bg-white h-full shadow-2xl p-4 flex flex-col gap-2">
                                <div className="flex items-center gap-4 mb-4">
                                    <button onClick={() => setIsSidebarOpen(false)}><Icon name="menu" /></button>
                                    <span className="font-bold text-xl">YouTube</span>
                                </div>
                                <button 
                                    onClick={() => { setShowBlockedList(false); setIsSidebarOpen(false); }}
                                    className={`flex items-center gap-4 p-3 rounded-xl ${!showBlockedList ? 'bg-zinc-100 text-red-600' : 'hover:bg-zinc-50'}`}
                                >
                                    <Icon name="home" /> <span className="font-semibold text-sm">Home</span>
                                </button>
                                <button 
                                    onClick={() => { setShowBlockedList(true); setIsSidebarOpen(false); }}
                                    className={`flex items-center gap-4 p-3 rounded-xl ${showBlockedList ? 'bg-zinc-100 text-red-600' : 'hover:bg-zinc-50'}`}
                                >
                                    <Icon name="ban" /> <span className="font-semibold text-sm">Blocked Channels</span>
                                </button>
                            </div>
                            <div className="flex-1 bg-black/40 backdrop-blur-sm" onClick={() => setIsSidebarOpen(false)}></div>
                        </div>
                    )}

                    {/* Main */}
                    <main className="pt-20 px-4 md:px-8 max-w-[1700px] mx-auto flex flex-col lg:flex-row gap-6">
                        <div className="flex-1">
                            {/* Player */}
                            <div className="w-full aspect-video bg-black rounded-2xl overflow-hidden relative group">
                                <img src={currentVideo.thumbnail} className="w-full h-full object-cover opacity-90" alt="" />
                                <div className="absolute inset-x-0 bottom-0 p-4 bg-gradient-to-t from-black/80 to-transparent flex items-center justify-between text-white">
                                    <div className="flex items-center gap-4">
                                        <button onClick={() => setIsPlaying(!isPlaying)}>
                                            <Icon name={isPlaying ? "pause" : "play"} fill="currentColor" />
                                        </button>
                                        <Icon name="skip-forward" fill="currentColor" />
                                        <Icon name="volume-2" />
                                        <span className="text-xs font-bold">4:20 / {currentVideo.duration}</span>
                                    </div>
                                    <div className="flex items-center gap-4">
                                        <Icon name="settings" />
                                        <Icon name="maximize" />
                                    </div>
                                </div>
                            </div>

                            {/* Info */}
                            <div className="mt-4">
                                <h1 className="text-2xl font-bold mb-3">{currentVideo.title}</h1>
                                <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                                    <div className="flex items-center gap-3">
                                        <div className="w-10 h-10 rounded-full bg-zinc-200 overflow-hidden">
                                            <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=100&h=100&fit=crop" alt="" />
                                        </div>
                                        <div>
                                            <h3 className="font-bold text-sm">{currentVideo.channel}</h3>
                                            <p className="text-xs text-zinc-500">{currentVideo.subscribers} subscribers</p>
                                        </div>
                                        <button 
                                            onClick={() => setIsSubscribed(!isSubscribed)}
                                            className={`ml-4 px-4 py-2 rounded-full text-sm font-bold ${isSubscribed ? 'bg-zinc-100' : 'bg-black text-white'}`}
                                        >
                                            {isSubscribed ? 'Subscribed' : 'Subscribe'}
                                        </button>
                                        <button 
                                            onClick={toggleBlock}
                                            className={`flex items-center gap-1.5 px-3 py-2 rounded-full border text-sm font-bold ${isCurrentChannelBlocked ? 'bg-red-600 text-white border-red-600 shadow-lg' : 'border-zinc-200 text-red-600 hover:bg-zinc-50'}`}
                                        >
                                            <Icon name="ban" className="w-4 h-4" />
                                            <span>{isCurrentChannelBlocked ? 'Blocked' : 'Block'}</span>
                                        </button>
                                    </div>

                                    <div className="flex items-center gap-2">
                                        <div className="flex bg-zinc-100 rounded-full h-9 overflow-hidden">
                                            <button 
                                                onClick={() => setUserVote(userVote === 'up' ? null : 'up')}
                                                className={`flex items-center gap-2 px-4 hover:bg-zinc-200 font-bold text-sm ${userVote === 'up' ? 'text-red-600' : ''}`}
                                            >
                                                <Icon name="thumbs-up" className="w-5 h-5" fill={userVote === 'up' ? 'currentColor' : 'none'} /> {currentVideo.likes}
                                            </button>
                                            <div className="w-[1px] h-full bg-zinc-300"></div>
                                            <button 
                                                onClick={() => setUserVote(userVote === 'down' ? null : 'down')}
                                                className={`flex items-center px-4 hover:bg-zinc-200 ${userVote === 'down' ? 'text-red-600' : ''}`}
                                            >
                                                <Icon name="thumbs-down" className="w-5 h-5" fill={userVote === 'down' ? 'currentColor' : 'none'} />
                                            </button>
                                        </div>
                                        <button className="bg-zinc-100 hover:bg-zinc-200 px-4 h-9 rounded-full flex items-center gap-2 text-sm font-bold">
                                            <Icon name="share-2" className="w-5 h-5" /> Share
                                        </button>
                                    </div>
                                </div>
                                
                                <div className="mt-4 bg-zinc-100 rounded-2xl p-4 cursor-pointer hover:bg-zinc-200 transition-colors">
                                    <p className="font-bold text-sm mb-1">{currentVideo.views} views • {currentVideo.time}</p>
                                    <p className="text-sm leading-relaxed">{currentVideo.description}</p>
                                </div>
                            </div>
                        </div>

                        {/* Recommendation / Blocked Side */}
                        <div className="lg:w-[400px]">
                            {showBlockedList ? (
                                <div className="bg-white rounded-2xl p-6 border border-zinc-200">
                                    <h2 className="text-xl font-bold mb-4 flex items-center gap-2"><Icon name="ban" className="text-red-600" /> Blocked</h2>
                                    {blockedChannels.size === 0 ? (
                                        <p className="text-zinc-500 text-sm">No channels blocked.</p>
                                    ) : (
                                        <div className="space-y-3">
                                            {Array.from(blockedChannels).map(ch => (
                                                <div key={ch} className="flex items-center justify-between p-3 bg-zinc-50 rounded-xl">
                                                    <span className="font-bold text-sm">{ch}</span>
                                                    <button onClick={() => setBlockedChannels(prev => { let n = new Set(prev); n.delete(ch); return n; })} className="text-xs font-bold text-red-600 hover:underline">Unblock</button>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            ) : (
                                <div className="space-y-4">
                                    {filteredVideos.map(video => (
                                        <div key={video.id} onClick={() => handleVideoSelect(video)} className="flex gap-3 cursor-pointer group">
                                            <div className="w-40 h-24 rounded-xl overflow-hidden flex-shrink-0 relative">
                                                <img src={video.thumbnail} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" alt="" />
                                                <span className="absolute bottom-1 right-1 bg-black/80 text-white text-[10px] font-bold px-1 rounded">{video.duration}</span>
                                            </div>
                                            <div className="flex-1">
                                                <h3 className="text-sm font-bold line-clamp-2 leading-tight group-hover:text-red-600 transition-colors">{video.title}</h3>
                                                <p className="text-xs text-zinc-500 mt-1">{video.channel}</p>
                                                <p className="text-xs text-zinc-500">{video.views} views</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
